<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — 넥스트파트너</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body style="background:var(--color-neutral-50);">

<div class="form-page">
  <div class="form-box">
    <!-- 로고 -->
    <div class="form-logo">넥스트파트너</div>
    <h1 class="form-title">다시 오셨군요!</h1>
    <p class="form-sub">전화번호와 비밀번호로 로그인하세요</p>

    <!-- 소셜 로그인 (3.2, 3.3) -->
    <div class="np-btn-group-stack" style="margin-bottom:8px;">
      <button class="social-btn btn-kakao" onclick="alert('카카오 로그인')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 6.69 2 11.25c0 2.9 1.9 5.46 4.78 7l-1.2 4.38 4.97-3.3C11.17 19.44 11.58 19.5 12 19.5c5.52 0 10-3.69 10-8.25S17.52 3 12 3z"/></svg>
        카카오로 로그인
      </button>
      <button class="social-btn btn-naver" onclick="alert('네이버 로그인')">
        <span style="font-size:20px; font-weight:900; font-style:italic;">N</span>
        네이버로 로그인
      </button>
    </div>

    <div class="form-divider">또는</div>

    <!-- 전화번호 + 비밀번호 (3.1) -->
    <form class="form-fields" onsubmit="handleLogin(event)">
      <div class="np-field">
        <label class="np-label" for="phone">전화번호</label>
        <div class="np-input-wrap">
          <input
            id="phone"
            type="tel"
            class="np-input"
            placeholder="010-0000-0000"
            inputmode="tel"
            autocomplete="tel"
            oninput="formatPhone(this)"
          />
        </div>
      </div>
      <div class="np-field">
        <label class="np-label" for="password">비밀번호</label>
        <div class="np-input-wrap" style="position:relative;">
          <input
            id="password"
            type="password"
            class="np-input"
            placeholder="비밀번호를 입력하세요"
            autocomplete="current-password"
            style="padding-right:52px;"
          />
          <button
            type="button"
            onclick="togglePw()"
            aria-label="비밀번호 표시/숨기기"
            style="position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--color-neutral-400); padding:4px;"
          >
            <svg id="pw-eye" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <!-- 로그인 실패 시 표시 (기본 숨김) -->
        <p class="np-error-msg" id="login-error" style="display:none;">
          전화번호 또는 비밀번호가 맞지 않아요. 다시 확인해주세요.
        </p>
      </div>

      <!-- 로그인 버튼 -->
      <button type="submit" class="np-btn np-btn-primary np-btn-lg np-btn-full" id="login-btn">
        로그인
      </button>
    </form>

    <!-- 비밀번호 찾기 (3.4) -->
    <div style="text-align:center; margin-top:4px;">
      <a href="reset-password.html" style="font-size:15px; color:var(--color-neutral-600); text-decoration:underline; cursor:pointer;">
        비밀번호 찾기(재설정)
      </a>
    </div>

    <!-- 회원가입 안내 -->
    <div class="form-footer" style="margin-top:24px; padding-top:20px; border-top:1px solid var(--color-neutral-200);">
      아직 회원이 아니신가요?
      <a href="signup.html">회원가입</a>
    </div>
  </div>

  <!-- 도움말 -->
  <div style="margin-top:16px; text-align:center; font-size:14px; color:var(--color-neutral-400);">
    로그인이 어려우신가요?
    <span style="color:var(--color-primary-500); cursor:pointer; font-weight:700;" onclick="alert('고객센터: 1588-0000\n운영시간: 평일 09:00~18:00')">고객센터 문의</span>
  </div>
</div>

<script>
function formatPhone(input) {
  let val = input.value.replace(/\D/g, '');
  if (val.length <= 3) {
    input.value = val;
  } else if (val.length <= 7) {
    input.value = val.slice(0,3) + '-' + val.slice(3);
  } else {
    input.value = val.slice(0,3) + '-' + val.slice(3,7) + '-' + val.slice(7,11);
  }
}

function togglePw() {
  const pw = document.getElementById('password');
  const eye = document.getElementById('pw-eye');
  if (pw.type === 'password') {
    pw.type = 'text';
    eye.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    pw.type = 'password';
    eye.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.textContent = '로그인 중...';
  btn.disabled = true;

  setTimeout(() => {
    // 시뮬레이션: 성공 시 홈으로 이동
    location.href = 'index.html';
  }, 1000);
}
</script>
</body>
</html>
